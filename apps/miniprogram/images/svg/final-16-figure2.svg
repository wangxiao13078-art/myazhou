<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 140">
  <text x="90" y="12" text-anchor="middle" font-size="11">图2</text>
  
  <!-- 射线OM (向左下) -->
  <line x1="90" y1="100" x2="20" y2="120" stroke="#333" stroke-width="2"/>
  <!-- 射线ON (向右下) -->
  <line x1="90" y1="100" x2="160" y2="120" stroke="#333" stroke-width="2"/>
  
  <!-- 射线OA -->
  <line x1="90" y1="100" x2="40" y2="50" stroke="#333" stroke-width="2"/>
  <!-- 射线OB -->
  <line x1="90" y1="100" x2="140" y2="50" stroke="#333" stroke-width="2"/>
  
  <!-- 射线OC (平分角AOM) -->
  <line x1="90" y1="100" x2="25" y2="85" stroke="#2196F3" stroke-width="1.5"/>
  <!-- 射线OD (平分角BON) -->
  <line x1="90" y1="100" x2="155" y2="85" stroke="#2196F3" stroke-width="1.5"/>
  
  <!-- 标签 -->
  <text x="15" y="125" font-family="Arial" font-size="12" font-style="italic">M</text>
  <text x="160" y="125" font-family="Arial" font-size="12" font-style="italic">N</text>
  <text x="35" y="45" font-family="Arial" font-size="12" font-style="italic">A</text>
  <text x="145" y="45" font-family="Arial" font-size="12" font-style="italic">B</text>
  <text x="90" y="115" font-family="Arial" font-size="12" font-style="italic">O</text>
  <text x="15" y="80" font-family="Arial" font-size="11" font-style="italic" fill="#2196F3">C</text>
  <text x="160" y="80" font-family="Arial" font-size="11" font-style="italic" fill="#2196F3">D</text>
</svg>
