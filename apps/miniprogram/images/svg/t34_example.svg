<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80">
  <!-- 分类讨论：线段AB，点C可在不同位置 -->
  <line x1="50" y1="40" x2="350" y2="40" stroke="#333" stroke-width="2"/>
  <!-- 端点 -->
  <circle cx="50" cy="40" r="4" fill="#333"/>
  <circle cx="350" cy="40" r="4" fill="#333"/>
  <!-- C点位置1 -->
  <circle cx="150" cy="40" r="3" fill="#E91E63"/>
  <!-- C点位置2（虚线表示另一种情况） -->
  <circle cx="250" cy="40" r="3" stroke="#E91E63" fill="none" stroke-width="2" stroke-dasharray="2,2"/>
  <!-- 标签 -->
  <text x="50" y="65" font-family="Arial" font-size="14" text-anchor="middle">A</text>
  <text x="150" y="65" font-family="Arial" font-size="14" text-anchor="middle" fill="#E91E63">C₁</text>
  <text x="250" y="65" font-family="Arial" font-size="14" text-anchor="middle" fill="#E91E63">C₂</text>
  <text x="350" y="65" font-family="Arial" font-size="14" text-anchor="middle">B</text>
  <!-- 说明 -->
  <text x="200" y="15" font-family="Arial" font-size="12" text-anchor="middle" fill="#666">C点位置需分类讨论</text>
</svg>

