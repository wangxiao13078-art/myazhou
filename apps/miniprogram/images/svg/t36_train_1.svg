<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- 训练1：∠AOB=α，∠BOC=β，OM平分∠AOC，ON平分∠BOC -->
  <!-- 原点O -->
  <circle cx="100" cy="150" r="4" fill="#333"/>
  <!-- 射线OA（向上） -->
  <line x1="100" y1="150" x2="60" y2="40" stroke="#333" stroke-width="2"/>
  <!-- 射线OB（向右上） -->
  <line x1="100" y1="150" x2="200" y2="80" stroke="#333" stroke-width="2"/>
  <!-- 射线OC（向右下） -->
  <line x1="100" y1="150" x2="260" y2="170" stroke="#333" stroke-width="2"/>
  <!-- 射线OM（OA和OC之间，平分∠AOC） -->
  <line x1="100" y1="150" x2="130" y2="50" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- 射线ON（OB和OC之间，平分∠BOC） -->
  <line x1="100" y1="150" x2="240" y2="120" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- 标签 -->
  <text x="100" y="170" font-family="Arial" font-size="14" text-anchor="middle">O</text>
  <text x="50" y="35" font-family="Arial" font-size="14">A</text>
  <text x="210" y="75" font-family="Arial" font-size="14">B</text>
  <text x="270" y="175" font-family="Arial" font-size="14">C</text>
  <text x="140" y="45" font-family="Arial" font-size="12" fill="#2196F3">M</text>
  <text x="250" y="115" font-family="Arial" font-size="12" fill="#E91E63">N</text>
</svg>
