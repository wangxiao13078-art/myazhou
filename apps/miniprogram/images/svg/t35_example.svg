<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <!-- 数形结合：数轴 -->
  <line x1="20" y1="50" x2="380" y2="50" stroke="#333" stroke-width="2"/>
  <!-- 箭头 -->
  <polygon points="380,50 370,45 370,55" fill="#333"/>
  <!-- 原点 -->
  <circle cx="200" cy="50" r="4" fill="#333"/>
  <!-- 刻度 -->
  <line x1="80" y1="45" x2="80" y2="55" stroke="#333" stroke-width="1"/>
  <line x1="140" y1="45" x2="140" y2="55" stroke="#333" stroke-width="1"/>
  <line x1="260" y1="45" x2="260" y2="55" stroke="#333" stroke-width="1"/>
  <line x1="320" y1="45" x2="320" y2="55" stroke="#333" stroke-width="1"/>
  <!-- 点A和B -->
  <circle cx="100" cy="50" r="4" fill="#2196F3"/>
  <circle cx="280" cy="50" r="4" fill="#E91E63"/>
  <!-- 标签 -->
  <text x="200" y="75" font-family="Arial" font-size="12" text-anchor="middle">0</text>
  <text x="80" y="75" font-family="Arial" font-size="12" text-anchor="middle">-2</text>
  <text x="140" y="75" font-family="Arial" font-size="12" text-anchor="middle">-1</text>
  <text x="260" y="75" font-family="Arial" font-size="12" text-anchor="middle">1</text>
  <text x="320" y="75" font-family="Arial" font-size="12" text-anchor="middle">2</text>
  <text x="100" y="35" font-family="Arial" font-size="14" text-anchor="middle" fill="#2196F3">A</text>
  <text x="280" y="35" font-family="Arial" font-size="14" text-anchor="middle" fill="#E91E63">B</text>
</svg>

