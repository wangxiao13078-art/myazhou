<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150">
  <!-- 图1: 角COD=140° -->
  <g transform="translate(0,0)">
    <line x1="20" y1="100" x2="100" y2="100" stroke="#333" stroke-width="2"/>
    <line x1="60" y1="100" x2="20" y2="40" stroke="#333" stroke-width="2"/>
    <line x1="60" y1="100" x2="100" y2="40" stroke="#333" stroke-width="2"/>
    <line x1="60" y1="100" x2="60" y2="30" stroke="#2196F3" stroke-width="1.5"/>
    <text x="15" y="100" font-family="Arial" font-size="11">A</text>
    <text x="100" y="100" font-family="Arial" font-size="11">B</text>
    <text x="15" y="35" font-family="Arial" font-size="11">C</text>
    <text x="100" y="35" font-family="Arial" font-size="11">D</text>
    <text x="60" y="115" font-family="Arial" font-size="11">O</text>
    <text x="65" y="30" font-family="Arial" font-size="10" fill="#2196F3">E</text>
    <text x="70" y="75" font-family="Arial" font-size="10">140°</text>
    <text x="45" y="15" font-family="Arial" font-size="11">图1</text>
  </g>
  <!-- 图2 -->
  <g transform="translate(120,0)">
    <line x1="20" y1="100" x2="100" y2="100" stroke="#333" stroke-width="2"/>
    <line x1="60" y1="100" x2="100" y2="40" stroke="#333" stroke-width="2"/>
    <line x1="60" y1="100" x2="60" y2="30" stroke="#333" stroke-width="2"/>
    <line x1="60" y1="100" x2="30" y2="50" stroke="#2196F3" stroke-width="1.5"/>
    <text x="15" y="100" font-family="Arial" font-size="11">A</text>
    <text x="100" y="100" font-family="Arial" font-size="11">B</text>
    <text x="100" y="35" font-family="Arial" font-size="11">C</text>
    <text x="55" y="25" font-family="Arial" font-size="11">D</text>
    <text x="60" y="115" font-family="Arial" font-size="11">O</text>
    <text x="20" y="45" font-family="Arial" font-size="10" fill="#2196F3">E</text>
    <text x="55" y="15" font-family="Arial" font-size="11">图2</text>
  </g>
</svg>

