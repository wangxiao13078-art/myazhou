<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80">
  <!-- 线段，点A、E、D、B、C -->
  <line x1="30" y1="40" x2="370" y2="40" stroke="#333" stroke-width="2"/>
  <!-- 端点和中间点 -->
  <circle cx="30" cy="40" r="4" fill="#333"/>
  <circle cx="100" cy="40" r="3" fill="#2196F3"/>
  <circle cx="170" cy="40" r="3" fill="#2196F3"/>
  <circle cx="240" cy="40" r="4" fill="#333"/>
  <circle cx="370" cy="40" r="4" fill="#333"/>
  <!-- 标签 -->
  <text x="30" y="65" font-family="Arial" font-size="14" text-anchor="middle">A</text>
  <text x="100" y="65" font-family="Arial" font-size="14" text-anchor="middle" fill="#2196F3">E</text>
  <text x="170" y="65" font-family="Arial" font-size="14" text-anchor="middle" fill="#2196F3">D</text>
  <text x="240" y="65" font-family="Arial" font-size="14" text-anchor="middle">B</text>
  <text x="370" y="65" font-family="Arial" font-size="14" text-anchor="middle">C</text>
</svg>

