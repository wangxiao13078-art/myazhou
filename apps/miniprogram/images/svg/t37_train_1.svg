<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- 训练1：OB是∠AOC的平分线，OD是∠COE的平分线 -->
  <!-- 原点O -->
  <circle cx="100" cy="150" r="4" fill="#333"/>
  <!-- 射线OA（向右） -->
  <line x1="100" y1="150" x2="260" y2="170" stroke="#333" stroke-width="2"/>
  <!-- 射线OB（向右上） -->
  <line x1="100" y1="150" x2="220" y2="100" stroke="#2196F3" stroke-width="2"/>
  <!-- 射线OC（向上） -->
  <line x1="100" y1="150" x2="180" y2="60" stroke="#333" stroke-width="2"/>
  <!-- 射线OD（OC和OE之间） -->
  <line x1="100" y1="150" x2="140" y2="50" stroke="#E91E63" stroke-width="2"/>
  <!-- 射线OE（向左上） -->
  <line x1="100" y1="150" x2="100" y2="40" stroke="#333" stroke-width="2"/>
  <!-- 射线OM（更左上） -->
  <line x1="100" y1="150" x2="60" y2="60" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- 标签 -->
  <text x="100" y="170" font-family="Arial" font-size="14" text-anchor="middle">O</text>
  <text x="270" y="175" font-family="Arial" font-size="14">A</text>
  <text x="230" y="95" font-family="Arial" font-size="14" fill="#2196F3">B</text>
  <text x="190" y="55" font-family="Arial" font-size="14">C</text>
  <text x="145" y="45" font-family="Arial" font-size="14" fill="#E91E63">D</text>
  <text x="105" y="35" font-family="Arial" font-size="14">E</text>
  <text x="50" y="55" font-family="Arial" font-size="12" fill="#4CAF50">M</text>
</svg>
