<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 140">
  <text x="90" y="12" text-anchor="middle" font-size="11">图3</text>
  
  <!-- 射线OM (向左下) -->
  <line x1="90" y1="100" x2="20" y2="120" stroke="#333" stroke-width="2"/>
  <!-- 射线ON (向右下) -->
  <line x1="90" y1="100" x2="160" y2="120" stroke="#333" stroke-width="2"/>
  
  <!-- 射线OA -->
  <line x1="90" y1="100" x2="50" y2="40" stroke="#333" stroke-width="2"/>
  <!-- 射线OB -->
  <line x1="90" y1="100" x2="130" y2="40" stroke="#333" stroke-width="2"/>
  
  <!-- 射线OC -->
  <line x1="90" y1="100" x2="30" y2="70" stroke="#E53935" stroke-width="1.5"/>
  <!-- 射线OD -->
  <line x1="90" y1="100" x2="150" y2="70" stroke="#E53935" stroke-width="1.5"/>
  
  <!-- 标签 -->
  <text x="15" y="125" font-family="Arial" font-size="12" font-style="italic">M</text>
  <text x="160" y="125" font-family="Arial" font-size="12" font-style="italic">N</text>
  <text x="45" y="35" font-family="Arial" font-size="12" font-style="italic">A</text>
  <text x="135" y="35" font-family="Arial" font-size="12" font-style="italic">B</text>
  <text x="90" y="115" font-family="Arial" font-size="12" font-style="italic">O</text>
  <text x="20" y="65" font-family="Arial" font-size="11" font-style="italic" fill="#E53935">C</text>
  <text x="155" y="65" font-family="Arial" font-size="11" font-style="italic" fill="#E53935">D</text>
</svg>
