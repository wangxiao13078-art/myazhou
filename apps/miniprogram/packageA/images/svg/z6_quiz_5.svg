    <path d="M 60 85 L 75 85 L 75 100" fill="none" stroke="#666" stroke-width="1"/>
    <text x="5" y="100" font-family="Arial" font-size="11">A</text>
    <text x="110" y="100" font-family="Arial" font-size="11">B</text>
    <text x="55" y="25" font-family="Arial" font-size="11">C</text>
