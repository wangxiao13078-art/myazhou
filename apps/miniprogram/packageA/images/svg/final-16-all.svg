<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160">
  <!-- 图1: 线段 -->
  <g transform="translate(10,20)">
    <text x="70" y="0" text-anchor="middle" font-size="11">图1</text>
    <line x1="10" y1="40" x2="130" y2="40" stroke="#333" stroke-width="2"/>
    <circle cx="10" cy="40" r="3" fill="#333"/>
    <circle cx="35" cy="40" r="3" fill="#2196F3"/>
    <circle cx="50" cy="40" r="3" fill="#333"/>
    <circle cx="80" cy="40" r="3" fill="#333"/>
    <circle cx="105" cy="40" r="3" fill="#E53935"/>
    <circle cx="130" cy="40" r="3" fill="#333"/>
    <text x="10" y="60" text-anchor="middle" font-size="11" font-style="italic">M</text>
    <text x="35" y="60" text-anchor="middle" font-size="11" font-style="italic" fill="#2196F3">C</text>
    <text x="50" y="30" text-anchor="middle" font-size="11" font-style="italic">A</text>
    <text x="80" y="30" text-anchor="middle" font-size="11" font-style="italic">B</text>
    <text x="105" y="60" text-anchor="middle" font-size="11" font-style="italic" fill="#E53935">D</text>
    <text x="130" y="60" text-anchor="middle" font-size="11" font-style="italic">N</text>
  </g>
  
  <!-- 图2: 角度图 -->
  <g transform="translate(160,10)">
    <text x="70" y="10" text-anchor="middle" font-size="11">图2</text>
    <line x1="70" y1="100" x2="10" y2="120" stroke="#333" stroke-width="2"/>
    <line x1="70" y1="100" x2="130" y2="120" stroke="#333" stroke-width="2"/>
    <line x1="70" y1="100" x2="30" y2="50" stroke="#333" stroke-width="2"/>
    <line x1="70" y1="100" x2="110" y2="50" stroke="#333" stroke-width="2"/>
    <line x1="70" y1="100" x2="15" y2="85" stroke="#2196F3" stroke-width="1.5"/>
    <line x1="70" y1="100" x2="125" y2="85" stroke="#2196F3" stroke-width="1.5"/>
    <text x="5" y="125" font-size="11" font-style="italic">M</text>
    <text x="130" y="125" font-size="11" font-style="italic">N</text>
    <text x="25" y="45" font-size="11" font-style="italic">A</text>
    <text x="115" y="45" font-size="11" font-style="italic">B</text>
    <text x="70" y="115" font-size="11" font-style="italic">O</text>
    <text x="5" y="80" font-size="10" font-style="italic" fill="#2196F3">C</text>
    <text x="130" y="80" font-size="10" font-style="italic" fill="#2196F3">D</text>
  </g>
  
  <!-- 图3: 角度图 -->
  <g transform="translate(320,10)">
    <text x="70" y="10" text-anchor="middle" font-size="11">图3</text>
    <line x1="70" y1="100" x2="10" y2="120" stroke="#333" stroke-width="2"/>
    <line x1="70" y1="100" x2="130" y2="120" stroke="#333" stroke-width="2"/>
    <line x1="70" y1="100" x2="40" y2="40" stroke="#333" stroke-width="2"/>
    <line x1="70" y1="100" x2="100" y2="40" stroke="#333" stroke-width="2"/>
    <line x1="70" y1="100" x2="20" y2="70" stroke="#E53935" stroke-width="1.5"/>
    <line x1="70" y1="100" x2="120" y2="70" stroke="#E53935" stroke-width="1.5"/>
    <text x="5" y="125" font-size="11" font-style="italic">M</text>
    <text x="130" y="125" font-size="11" font-style="italic">N</text>
    <text x="35" y="35" font-size="11" font-style="italic">A</text>
    <text x="105" y="35" font-size="11" font-style="italic">B</text>
    <text x="70" y="115" font-size="11" font-style="italic">O</text>
    <text x="10" y="65" font-size="10" font-style="italic" fill="#E53935">C</text>
    <text x="125" y="65" font-size="10" font-style="italic" fill="#E53935">D</text>
  </g>
</svg>

