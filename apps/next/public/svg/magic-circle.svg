<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- 外圈正方形 -->
  <rect x="50" y="50" width="200" height="200" fill="none" stroke="#333" stroke-width="2"/>
  
  <!-- 内圈正方形（旋转45度） -->
  <rect x="100" y="100" width="100" height="100" fill="none" stroke="#333" stroke-width="2" transform="rotate(45, 150, 150)"/>
  
  <!-- 顶部圆圈 -14 -->
  <circle cx="150" cy="50" r="20" fill="white" stroke="#333" stroke-width="2"/>
  <text x="150" y="55" text-anchor="middle" font-size="12" fill="#333">-14</text>
  
  <!-- 右上圆圈 12 -->
  <circle cx="250" cy="50" r="20" fill="white" stroke="#333" stroke-width="2"/>
  <text x="250" y="55" text-anchor="middle" font-size="12" fill="#333">12</text>
  
  <!-- 右侧圆圈 b -->
  <circle cx="250" cy="150" r="20" fill="white" stroke="#333" stroke-width="2"/>
  <text x="250" y="55" text-anchor="middle" font-size="14" fill="#333" font-style="italic">b</text>
  
  <!-- 右下圆圈 c -->
  <circle cx="250" cy="250" r="20" fill="white" stroke="#333" stroke-width="2"/>
  <text x="250" y="255" text-anchor="middle" font-size="14" fill="#333" font-style="italic">c</text>
  
  <!-- 底部圆圈 8 -->
  <circle cx="150" cy="250" r="20" fill="white" stroke="#333" stroke-width="2"/>
  <text x="150" y="255" text-anchor="middle" font-size="12" fill="#333">8</text>
  
  <!-- 左下圆圈 d -->
  <circle cx="50" cy="250" r="20" fill="white" stroke="#333" stroke-width="2"/>
  <text x="50" y="255" text-anchor="middle" font-size="14" fill="#333" font-style="italic">d</text>
  
  <!-- 左侧圆圈 a -->
  <circle cx="50" cy="150" r="20" fill="white" stroke="#333" stroke-width="2"/>
  <text x="50" y="155" text-anchor="middle" font-size="14" fill="#333" font-style="italic">a</text>
  
  <!-- 左上圆圈 -->
  <circle cx="50" cy="50" r="20" fill="white" stroke="#333" stroke-width="2"/>
  
  <!-- 中心圆圈 16 -->
  <circle cx="150" cy="150" r="20" fill="white" stroke="#333" stroke-width="2"/>
  <text x="150" y="155" text-anchor="middle" font-size="12" fill="#333">16</text>
</svg>

