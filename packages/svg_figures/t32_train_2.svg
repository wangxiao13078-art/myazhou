<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80">
  <!-- 线段整体思想 -->
  <line x1="40" y1="40" x2="360" y2="40" stroke="#333" stroke-width="2"/>
  <circle cx="40" cy="40" r="4" fill="#333"/>
  <circle cx="120" cy="40" r="3" fill="#2196F3"/>
  <circle cx="200" cy="40" r="3" fill="#E91E63"/>
  <circle cx="280" cy="40" r="3" fill="#4CAF50"/>
  <circle cx="360" cy="40" r="4" fill="#333"/>
  <text x="40" y="65" font-family="Arial" font-size="14" text-anchor="middle">A</text>
  <text x="120" y="65" font-family="Arial" font-size="14" text-anchor="middle" fill="#2196F3">P</text>
  <text x="200" y="65" font-family="Arial" font-size="14" text-anchor="middle" fill="#E91E63">C</text>
  <text x="280" y="65" font-family="Arial" font-size="14" text-anchor="middle" fill="#4CAF50">Q</text>
  <text x="360" y="65" font-family="Arial" font-size="14" text-anchor="middle">B</text>
</svg>

