<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- 考点2例题：OC是∠AOD的平分线，OE是∠BOD的平分线 -->
  <!-- 原点O -->
  <circle cx="150" cy="150" r="4" fill="#333"/>
  <!-- 射线OA（向下） -->
  <line x1="150" y1="150" x2="250" y2="180" stroke="#333" stroke-width="2"/>
  <!-- 射线OB（向左上） -->
  <line x1="150" y1="150" x2="80" y2="60" stroke="#333" stroke-width="2"/>
  <!-- 射线OC（OA和OD之间） -->
  <line x1="150" y1="150" x2="240" y2="100" stroke="#2196F3" stroke-width="2"/>
  <!-- 射线OD（向右） -->
  <line x1="150" y1="150" x2="260" y2="130" stroke="#333" stroke-width="2"/>
  <!-- 射线OE（OB和OD之间） -->
  <line x1="150" y1="150" x2="120" y2="50" stroke="#E91E63" stroke-width="2"/>
  <!-- 标签 -->
  <text x="150" y="175" font-family="Arial" font-size="14" text-anchor="middle">O</text>
  <text x="260" y="190" font-family="Arial" font-size="14">A</text>
  <text x="70" y="55" font-family="Arial" font-size="14">B</text>
  <text x="250" y="95" font-family="Arial" font-size="14" fill="#2196F3">C</text>
  <text x="270" y="130" font-family="Arial" font-size="14">D</text>
  <text x="110" y="45" font-family="Arial" font-size="14" fill="#E91E63">E</text>
</svg>
