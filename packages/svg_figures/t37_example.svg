<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- 考法2例题：∠AOB:∠BOC=3:2，OD平分∠BOC，OE平分∠AOC -->
  <!-- 原点O -->
  <circle cx="150" cy="150" r="4" fill="#333"/>
  <!-- 射线OA（向右） -->
  <line x1="150" y1="150" x2="270" y2="150" stroke="#333" stroke-width="2"/>
  <!-- 射线OB（向右上） -->
  <line x1="150" y1="150" x2="250" y2="80" stroke="#333" stroke-width="2"/>
  <!-- 射线OC（向上） -->
  <line x1="150" y1="150" x2="180" y2="50" stroke="#333" stroke-width="2"/>
  <!-- 射线OD（OB和OC之间，平分∠BOC） -->
  <line x1="150" y1="150" x2="220" y2="55" stroke="#2196F3" stroke-width="1.5"/>
  <!-- 射线OE（向左上，平分∠AOC） -->
  <line x1="150" y1="150" x2="250" y2="60" stroke="#E91E63" stroke-width="1.5"/>
  <!-- 标签 -->
  <text x="150" y="170" font-family="Arial" font-size="14" text-anchor="middle">O</text>
  <text x="280" y="155" font-family="Arial" font-size="14">A</text>
  <text x="260" y="75" font-family="Arial" font-size="14">B</text>
  <text x="185" y="45" font-family="Arial" font-size="14">C</text>
  <text x="225" y="50" font-family="Arial" font-size="14" fill="#2196F3">D</text>
  <text x="260" y="55" font-family="Arial" font-size="14" fill="#E91E63">E</text>
</svg>
